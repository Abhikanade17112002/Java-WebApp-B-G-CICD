version: 0.0
os: linux

files:
  - source: target/demo.jar
    destination: /home/ec2-user/bluegreen/target/
  - source: scripts
    destination: /home/ec2-user/bluegreen/scripts/

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 300
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: root