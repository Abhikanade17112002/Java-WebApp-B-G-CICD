version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Installing any dependencies (if needed)..."
  pre_build:
    commands:
      - echo "Pre-build phase..."
  build:
    commands:
      - echo "Build started on `date`"
      - mvn clean package -DskipTests
  post_build:
    commands:
      - echo "Build completed on `date`"
      - mv target/demo-*.jar target/demo.jar

artifacts:
  files:
    - appspec.yml
    - target/demo.jar
    - scripts/**
  discard-paths: no